name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # node24
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # node24
        with:
          go-version-file: go.mod
          cache: false
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@36fe29c8f9dc696b104db0f7d49d1a87d2bbcd5b # node24

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # node24
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # node24
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test ./... -v -count=1
      - name: Integration tests
        run: go test ./tests/integration/... -tags integration -v -timeout 5m -count=1
